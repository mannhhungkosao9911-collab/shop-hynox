<div id="bank" class="content">
    <div class="warning-text">⚠️ LƯU Ý: CK PHẢI CÓ BILL + ĐÚNG NỘI DUNG. SAI KHÔNG DUYỆT!</div>
    <div id="qrBox"><img id="qrImg" src="" alt="QR Bank"></div>
    <p>Nội dung CK (Bắt buộc):</p>
    <b id="bankInfo" style="color: yellow; font-size: 18px; background: #222; padding: 5px 10px; border: 1px solid #fff;"></b>
    <button onclick="confirmBank()" style="margin-top:15px;">XÁC NHẬN ĐÃ CHUYỂN</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLQ02AWrMpUNgDaKDaWPe6fSyO_x6CVL5ew16sNo0GF1rTcfQePmNfJLjj1Qd0nI-TdQ/exec";
    let currentOrderCode = "";

    // Hàm tạo nội dung CK thông minh theo đúng ý HynoX
    function generateOrderCode() {
        const pkgSelect = document.getElementById('package');
        const pkgName = pkgSelect.options[pkgSelect.selectedIndex].text.split(' - ')[0].replace(' ', '').toUpperCase(); // Lấy "3NGAY", "1TUAN"...
        
        // Kiểm tra xem khách có tích chọn HWID không (Dựa vào bản V10 của ông)
        const hasHwid = document.getElementById('addHwid') && document.getElementById('addHwid').checked ? "HWID" : "NO";
        
        const randomNum = Math.floor(1000 + Math.random() * 9000);
        
        // Nội dung cuối cùng: Ví dụ "3NGAY HWID 1234" hoặc "1THANG NO 5678"
        currentOrderCode = `${pkgName} ${hasHwid} ${randomNum}`;
        document.getElementById('bankInfo').innerText = currentOrderCode;

        const amount = pkgSelect.value;
        const extra = (document.getElementById('addHwid') && document.getElementById('addHwid').checked) ? 20000 : 0;
        const total = parseInt(amount) + extra;

        // Cập nhật QR với nội dung và tổng tiền mới nhất
        document.getElementById('qrImg').src = `https://api.vietqr.io/image/970422-0040877165-qr_only.jpg?amount=${total}&addInfo=${encodeURIComponent(currentOrderCode)}`;
    }

    // Khi nạp thẻ thành công, nó sẽ tự lưu vào lịch sử máy khách
    function saveHistory(key) {
        let h = JSON.parse(localStorage.getItem('h_v11') || "[]");
        h.unshift({ 
            t: new Date().toLocaleString(), 
            k: key,
            p: document.getElementById('package').selectedOptions[0].text 
        });
        localStorage.setItem('h_v11', JSON.stringify(h.slice(0, 10))); // Lưu 10 cái gần nhất
        loadHistory();
    }

    function loadHistory() {
        let h = JSON.parse(localStorage.getItem('h_v11') || "[]");
        const list = document.getElementById('historyList');
        if(h.length > 0) {
            list.innerHTML = h.map(i => `
                <div style="border-bottom:1px solid #222; padding:8px; font-size:12px;">
                    <div style="color:#00ff41">${i.p} (${i.t})</div>
                    <div style="color:white; word-break:break-all;">Key: ${i.k}</div>
                    <button onclick="navigator.clipboard.writeText('${i.k}');alert('Đã copy!')" style="font-size:10px; cursor:pointer;">Copy Key</button>
                </div>
            `).join('');
        }
    }
</script>
