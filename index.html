<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HynoX Supreme - Shop Auto V7</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Consolas', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .shop-box { width: 450px; background: #0a0a0a; padding: 30px; border: 2px solid #00ff41; border-radius: 20px; box-shadow: 0 0 30px #00ff41; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 24px; text-shadow: 0 0 10px #00ff41; margin-bottom: 5px; }
        label { display: block; text-align: left; margin: 10px 0 5px 20px; font-size: 13px; font-weight: bold; }
        input, select { width: 90%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #00ff41; color: #fff; border-radius: 8px; outline: none; }
        #totalPrice { font-size: 22px; color: yellow; font-weight: bold; margin: 15px 0; }
        button { width: 90%; background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; }
        .copy-btn { background: #fff; color: #000; border: none; padding: 5px 10px; cursor: pointer; border-radius: 5px; font-size: 12px; margin-top: 10px; }
        .history-box { width: 450px; background: #0a0a0a; border: 1px solid #555; border-radius: 15px; padding: 15px; color: #aaa; text-align: left; }
        .history-item { border-bottom: 1px solid #222; padding: 10px 0; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
        .success { border: 2px solid yellow; color: yellow; background: rgba(255, 255, 0, 0.1); }
        .error { border: 2px solid red; color: #ff4d4d; background: rgba(255, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div class="shop-box">
        <h1>💎 HYNOX SUPREME SHOP 💎</h1>
        <label>CHỌN GÓI THỜI GIAN</label>
        <select id="package" onchange="updatePrice()"><option value="20000">3 Ngày - 20k</option><option value="40000">1 Tuần - 40k</option><option value="150000">1 Tháng - 150k</option></select>
        <div id="totalPrice">TỔNG: 20.000 VNĐ</div>
        <label>THÔNG TIN THẺ CÀO</label>
        <select id="cardType"><option value="GARENA">Thẻ Garena</option><option value="VIETTEL">Viettel</option></select>
        <input type="text" id="serial" placeholder="Số Serial"><input type="text" id="code" placeholder="Mã Thẻ">
        <button onclick="napThe()">XÁC NHẬN NẠP THẺ</button>
        <div id="result"></div>
    </div>
    <div class="history-box">
        <h3 style="color: #00ff41; margin: 0 0 10px 0;">🕒 LỊCH SỬ MUA HÀNG</h3>
        <div id="historyList">Chưa có giao dịch...</div>
    </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLQ02AWrMpUNgDaKDaWPe6fSyO_x6CVL5ew16sNo0GF1rTcfQePmNfJLjj1Qd0nI-TdQ/exec";
        window.onload = loadHistory;
        function updatePrice() { document.getElementById('totalPrice').innerText = "TỔNG: " + parseInt(document.getElementById('package').value).toLocaleString() + " VNĐ"; }
        async function napThe() {
            const btn = document.querySelector('button'); const resDiv = document.getElementById('result');
            const data = { type: document.getElementById('cardType').value, serial: document.getElementById('serial').value, code: document.getElementById('code').value, package: document.getElementById('package').selectedOptions[0].text, hwid: "Không" };
            if(!data.serial || !data.code) return;
            btn.innerText = "ĐANG KIỂM TRA..."; btn.disabled = true; resDiv.style.display = "none";
            try {
                const response = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(data) });
                const result = await response.json();
                if(result.status === "success") {
                    resDiv.className = "success"; resDiv.style.display = "block";
                    resDiv.innerHTML = `✅ KEY: <span id="keyVal">${result.key}</span><br><button class="copy-btn" onclick="copyKey()">COPY KEY</button>`;
                    saveHistory(data.package, result.key);
                } else { resDiv.className = "error"; resDiv.style.display = "block"; resDiv.innerHTML = "⚠️ " + result.msg; }
            } catch (e) { resDiv.className = "error"; resDiv.style.display = "block"; resDiv.innerHTML = "⚠️ Lỗi kết nối máy chủ!"; }
            btn.innerText = "XÁC NHẬN NẠP THẺ"; btn.disabled = false;
        }
        function copyKey() { navigator.clipboard.writeText(document.getElementById('keyVal').innerText); alert("Đã copy!"); }
        function saveHistory(pkg, key) {
            let h = JSON.parse(localStorage.getItem('hynox_h') || "[]");
            h.unshift({ time: new Date().toLocaleString(), pkg: pkg, key: key });
            localStorage.setItem('hynox_h', JSON.stringify(h.slice(0, 5))); loadHistory();
        }
        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('hynox_h') || "[]");
            document.getElementById('historyList').innerHTML = h.length ? h.map(i => `
                <div class="history-item">
                    <div><b>${i.pkg}</b><br><small>${i.time}</small></div>
                    <div style="color:white">${i.key.substring(0,10)}... <button onclick="navigator.clipboard.writeText('${i.key}');alert('Đã copy!');">Copy</button></div>
                </div>`).join('') : "Chưa có giao dịch...";
        }
    </script>
</body>
</html>
