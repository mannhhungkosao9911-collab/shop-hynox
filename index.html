<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYNOX SUPREME SHOP</title>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Consolas', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .shop-box { width: 100%; max-width: 450px; background: #0a0a0a; padding: 25px; border: 2px solid #00ff41; border-radius: 20px; box-shadow: 0 0 30px #00ff41; text-align: center; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; background: #111; border: 1px solid #00ff41; color: #fff; border-radius: 8px; outline: none; box-sizing: border-box; }
        button { width: 100%; background: #00ff41; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        .history-box { width: 100%; max-width: 450px; background: #0a0a0a; border: 1px solid #333; border-radius: 15px; padding: 15px; margin-top: 20px; box-sizing: border-box; }
        .copy-btn { width: auto; padding: 5px 12px; font-size: 11px; background: #00ff41; color: #000; border-radius: 4px; cursor: pointer; border:none; font-weight:bold; }
    </style>
</head>
<body>
    <div class="shop-box">
        <h1 style="margin-top:0;">💎 HYNOX SUPREME 💎</h1>
        
        <div style="text-align: left;">
            <label style="font-size: 12px;">CHỌN GÓI KEY:</label>
            <select id="package" onchange="updatePrice()">
                <option value="20000">3 Ngày - 20k</option>
                <option value="50000">1 Tuần - 50k</option>
                <option value="100000">1 Tháng - 100k</option>
                <option value="500000">Vĩnh Viễn - 500k</option>
            </select>

            <div style="font-size: 11px; margin-bottom: 10px; color: #888;">
                Cần mua thêm HWID? <a href="https://www.facebook.com/pham.nguyen.manh.hung.2025" target="_blank" style="color:#00ff41; text-decoration:none;">LIÊN HỆ ADMIN</a>
            </div>

            <div id="totalPrice" style="color:yellow; font-size:24px; font-weight:bold; text-align:center; margin-bottom:10px;">TỔNG: 20.000 VNĐ</div>
            
            <div style="color: #ff4d4d; font-size: 11px; font-weight: bold; text-align: center; background: rgba(255,0,0,0.1); padding: 8px; border: 1px dashed red; border-radius: 8px; margin-bottom: 15px;">
                ⚠️ LƯU Ý: Vui lòng nạp thẻ ĐÚNG MỆNH GIÁ với gói đã chọn.
            </div>

            <label style="font-size: 12px;">NHÀ MẠNG:</label>
            <select id="telco">
                <option value="VIETTEL">Viettel</option>
                <option value="MOBIFONE">Mobifone</option>
                <option value="VINAPHONE">Vinaphone</option>
                <option value="GARENA">Garena</option>
                <option value="ZING">Zing</option>
            </select>
            
            <input type="text" id="serial" placeholder="Số Serial">
            <input type="text" id="code" placeholder="Mã thẻ nạp">
            <button id="mainBtn" onclick="napThe()">XÁC NHẬN NẠP THẺ</button>
        </div>
    </div>

    <div class="history-box">
        <h3 style="color:#00ff41; margin:0 0 10px 0; font-size:16px;">🕒 LỊCH SỬ MUA (Của bạn)</h3>
        <div id="historyList" style="font-size:13px; color:#aaa;">Đang tải lịch sử...</div>
    </div>

    <script>
        // Tui đã nhét link của ông vào đây rồi nhé!
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLQ02AWrMpUNgDaKDaWPe6fSyO_x6CVL5ew16sNo0GF1rTcfQePmNfJLjj1Qd0nI-TdQ/exec";

        function updatePrice() {
            let base = parseInt(document.getElementById('package').value);
            document.getElementById('totalPrice').innerText = "TỔNG: " + base.toLocaleString() + " VNĐ";
        }

        async function napThe() {
            const telco = document.getElementById('telco').value;
            const serial = document.getElementById('serial').value;
            const code = document.getElementById('code').value;
            const amount = document.getElementById('package').value;
            const pkgText = document.getElementById('package').selectedOptions[0].text;

            if(!serial || !code) return alert("Nhập đủ thông tin!");
            const btn = document.getElementById('mainBtn');
            btn.disabled = true; btn.innerText = "ĐANG KIỂM TRA...";

            try {
                const res = await fetch(SCRIPT_URL, { 
                    method: "POST", 
                    mode: 'no-cors', // Dùng no-cors để tránh lỗi CORS khi gửi POST
                    body: JSON.stringify({ type: telco, serial: serial, code: code, package: pkgText, amount: amount })
                });

                // Vì dùng no-cors nên mình sẽ bắt đầu vòng lặp check ngay sau khi gửi
                let count = 0;
                const check = setInterval(async () => {
                    count++;
                    try {
                        const r = await fetch(SCRIPT_URL + "?check_id=" + serial);
                        const final = await r.json();
                        
                        if(final.status === "success") {
                            clearInterval(check); 
                            saveHistory(final.key, pkgText);
                            alert("✅ THÀNH CÔNG! Key của bạn: " + final.key);
                            location.reload();
                        } else if(final.status === "error") {
                            clearInterval(check); 
                            alert("❌ THẺ SAI: Sai mã, seri hoặc sai mệnh giá!");
                            location.reload();
                        } else if(count > 30) {
                            clearInterval(check); 
                            alert("⚠️ Hệ thống đang duyệt, vui lòng check lại Lịch sử sau 1-2 phút!");
                            location.reload();
                        }
                    } catch(e) {}
                }, 3000);
            } catch(e) { 
                alert("Lỗi kết nối Server!"); 
                btn.disabled = false; btn.innerText = "XÁC NHẬN NẠP THẺ"; 
            }
        }

        function saveHistory(key, pkg) {
            let h = JSON.parse(localStorage.getItem('hy_v1') || "[]");
            h.unshift({ t: new Date().toLocaleString(), k: key, p: pkg });
            localStorage.setItem('hy_v1', JSON.stringify(h.slice(0, 5)));
            loadHistory();
        }

        function loadHistory() {
            let h = JSON.parse(localStorage.getItem('hy_v1') || "[]");
            const list = document.getElementById('historyList');
            if(!h.length) { list.innerHTML = "Chưa có giao dịch..."; return; }
            list.innerHTML = h.map(i => `
                <div style="border-bottom:1px solid #333; padding:10px 0;">
                    <b style="color:#00ff41">${i.p}</b> <small style="color:#555;">(${i.t})</small><br>
                    <div style="display:flex; gap:8px; margin-top:5px; align-items:center;">
                        <code style="background:#111; padding:5px; flex:1; border:1px solid #222; font-size:11px;">${i.k}</code>
                        <button class="copy-btn" onclick="copyKey('${i.k}')">COPY</button>
                    </div>
                </div>`).join('');
        }

        function copyKey(k) { 
            navigator.clipboard.writeText(k); 
            alert("✅ Đã copy Key!"); 
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
